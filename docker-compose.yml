version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=text-embedding-3-small
      - OPENAI_CHAT_MODEL=gpt-4o-mini
      - DATABASE_URL=sqlite:///./atlas.db
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - atlas-data:/app/data
    command: >
      sh -c "python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  atlas-data:
